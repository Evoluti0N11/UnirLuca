  {n:1,q:"¿Cómo los cambios tecnológicos y sociales del siglo XIX hicieron posible la prensa de masas?",a:`<p><strong>Tecnología:</strong> La máquina de vapor aplicada a la imprenta (1814) multiplicó la producción de ejemplares, reduciendo el coste unitario drásticamente. La linotipia (1884) y la rotativa permitieron tiradas de decenas de miles de ejemplares por hora. El telégrafo (1837) aceleró la circulación de noticias a escala continental.</p><p><strong>Sociedad:</strong> La industrialización concentró millones de personas en ciudades (urbanización), generando una demanda de información local. La escolarización obligatoria redujo el analfabetismo y creó un público lector masivo. El sufragio masculino dio al ciudadano ordinario un interés genuino en la política. El ferrocarril hizo posible la distribución nacional en horas.</p><p><strong>Economía:</strong> La Revolución Industrial generó excedentes de producción que necesitaban ser vendidos; la publicidad necesitaba medios de masas, y los medios de masas necesitaban publicidad para financiarse. La sinergia entre estos factores es inseparable.</p>`},
  {n:2,q:"Compara la prensa de élite del siglo XVIII con la prensa popular del XIX.",a:`<p><strong>Prensa de élite:</strong> Dirigida a la burguesía letrada y la aristocracia. Precio alto (un chelín en Inglaterra). Lenguaje literario, denso, propio del ensayo político. Distribuida por suscripción previa. Financiada por partidos políticos o mecenas. Función: debate de ideas y legitimación del poder.</p><p><strong>Prensa popular:</strong> Dirigida a las clases trabajadoras urbanas. Precio de un centavo o penique. Lenguaje simple, directo, narrativo. Vendida en la calle por voceadores. Financiada por publicidad. Función: información práctica, entretenimiento y creación de comunidad lectora.</p><p><strong>Ruptura clave:</strong> La prensa popular separó la información del comentario político (al menos en teoría) y convirtió al lector en consumidor en lugar de en suscriptor comprometido ideológicamente. También universalizó el acceso a la información pública.</p>`},
  {n:3,q:"Analiza el papel de la publicidad en el surgimiento de la prensa popular.",a:`<p>La relación entre prensa popular y publicidad es simbiótica: cada uno necesita al otro para existir.</p><p>La prensa popular bajó el precio al mínimo (un centavo) para maximizar lectores. Pero alguien tenía que cubrir los costes de producción: la publicidad. Cuantos más lectores, más valiosos los anuncios; cuanto más barato el periódico, más lectores.</p><p>La Revolución Industrial creó a su vez la necesidad de publicidad: fábricas con producción masiva necesitaban crear demanda para sus productos idénticos. La prensa popular ofrecía el escaparate perfecto: llegaba a las masas que tenían, por primera vez, dinero para consumir.</p><p>Benjamin Day con The Sun (1833) fue el primero en formalizar este modelo: cobrar poco al lector y mucho al anunciante. Este círculo virtuoso (o vicioso, según se mire) sigue siendo el modelo básico de la mayor parte de los medios de comunicación actuales, incluidos los digitales.</p>`},
  {n:4,q:"Explica las innovaciones narrativas introducidas por los penny papers.",a:`<p>Los penny papers revolucionaron el periodismo con tres innovaciones narrativas fundamentales:</p><p><strong>1. La noticia de proximidad:</strong> Frente al artículo político abstracto, los penny papers cubrieron hechos concretos y cercanos: crímenes, incendios, sucesos del barrio. Crearon el concepto moderno de 'noticia' como acontecimiento verificable y localizado.</p><p><strong>2. El estilo directo:</strong> Párrafos cortos, frases simples, vocabulario accesible. El objetivo era que cualquiera con educación elemental pudiera leer y comprender. Esto contrasta con la prosa elaborada de la prensa de élite.</p><p><strong>3. El reportero como testigo:</strong> James Gordon Bennett cubrió personalmente crímenes (el caso de Helen Jewett, 1836). Nació la figura del periodista que va al lugar de los hechos, que pregunta, que describe. No solo opina: narra lo que ha visto.</p>`},
  {n:5,q:"Describe cómo la Guerra Civil estadounidense influyó en la evolución del periodismo.",a:`<p>La Guerra Civil (1861-1865) fue el primer conflicto masivamente cubierto por la prensa moderna. Sus consecuencias para el periodismo fueron estructurales:</p><p><strong>El telégrafo y el lead:</strong> Los corresponsales enviaban sus despachos por telégrafo, que cobraba por palabra y podía cortarse. Aprendieron a poner lo más importante al principio: quién, qué, cuándo, dónde. Si la transmisión se cortaba, el editor ya tenía lo esencial. Nació el lead o entradilla.</p><p><strong>La pirámide invertida:</strong> Como consecuencia del lead, los artículos se estructuraron de mayor a menor importancia (en vez del relato cronológico previo). El editor podía cortar por cualquier punto sin perder lo esencial. Esta estructura sigue siendo el estándar del periodismo informativo.</p><p><strong>La brevedad y la concisión:</strong> El coste del telégrafo penalizaba la verbosidad. Nació un estilo periodístico más económico, directo y eficiente, diferente del periodismo narrativo y literario previo.</p>`},
  {n:6,q:"Compara el sensacionalismo de Pulitzer y Hearst.",a:`<p><strong>Similitudes:</strong> Ambos usaron titulares grandes, ilustraciones impactantes, cobertura de crímenes y escándalos, precios bajos y campañas de agitación social. Ambos vieron la prensa como arma de poder político y como negocio de masas. Ambos contribuyeron a la guerra hispano-cubana de 1898 con una cobertura belicista.</p><p><strong>Diferencias:</strong> Pulitzer (inmigrante húngaro, llegó pobre a EE. UU.) tenía una agenda de reforma social genuina: el New York World denunció la corrupción, defendió a los inmigrantes y apoyó causas obreras. El sensacionalismo era también un vehículo de denuncia.</p><p>Hearst (hijo de millonario californiano) era más desvergonzadamente entretenedor. Su 'periodismo de acción' (fabricar noticias, organizar el rescate de Cisneros) era puro espectáculo. Menos ideológico que Pulitzer, más show business.</p><p><strong>Impacto cultural:</strong> Los dos juntos definieron el modelo de prensa popular que dominó el siglo XX y del que aún hoy son deudores los tabloides digitales.</p>`},
  {n:7,q:"Explica la respuesta de Adolph Ochs al sensacionalismo y analiza su modelo.",a:`<p>Adolph Ochs compró el New York Times en 1896 cuando el periódico estaba casi en quiebra, aplastado por la competencia de Pulitzer y Hearst. Su respuesta fue radicalmente contraria al sensacionalismo.</p><p><strong>Estrategia diferencial:</strong> 'All the news that's fit to print' como lema resumía su apuesta: no toda noticia merece publicarse, solo la que sea veraz, importante y digna. Esto implicaba rechazar el crimen sensacional, las campañas de agitación y la manipulación emocional.</p><p><strong>Contenidos:</strong> Política internacional, economía, cultura, ciencia. El NYT apostó por la profundidad y la verificación frente a la velocidad y el impacto. Creó suplementos especializados (libros, viajes, arte).</p><p><strong>Modelo económico:</strong> Bajó el precio a un centavo (para competir en circulación y atraer publicidad) pero mantuvo la seriedad de contenidos. Demostró que la calidad periodística y la rentabilidad no eran incompatibles.</p><p><strong>Legado:</strong> El modelo del NYT definió el concepto de 'prensa de referencia' o 'prensa de calidad' que seguirían Le Monde, The Guardian, El País o La Repubblica en el siglo XX.</p>`},
  {n:8,q:"Compara los modelos radiofónicos estadounidense y británico.",a:`<p><strong>Modelo estadounidense (comercial):</strong> La radio fue desde el principio un negocio privado. Empresas como NBC (1926) y CBS (1927) construyeron cadenas nacionales financiadas por publicidad. El criterio de programación era la audiencia máxima. El Estado solo regulaba el espectro (Federal Radio Commission, 1927). El resultado: entretenimiento de masas de alta calidad, pero con poca atención a minorías culturales o formación ciudadana.</p><p><strong>Modelo británico (servicio público):</strong> La BBC (1927) fue concebida por John Reith como servicio público con misión educativa, informativa y cultural. Financiada por canon (tasa anual de los poseedores de receptor), sin publicidad. Su primer mandato: 'inform, educate, entertain'. El resultado: contenidos de mayor ambición cultural pero a veces percibidos como elitistas o paternalistas.</p><p><strong>Tensión de fondo:</strong> Ambos modelos reflejan concepciones distintas de la democracia. El modelo americano confía en el mercado para determinar qué quiere el público. El modelo europeo asume que hay un 'bien público' en materia de información y cultura que el mercado solo no garantizaría.</p>`},
  {n:9,q:"Analiza el papel de la radio como herramienta de propaganda en el período de entreguerras.",a:`<p>La radio fue el primer medio capaz de llegar simultáneamente a millones de personas en sus hogares, con la voz directa del líder. Esto la convirtió en la herramienta de propaganda más poderosa de su tiempo.</p><p><strong>Los regímenes totalitarios:</strong> Hitler y Goebbels financiaron el Volksempfänger (receptor del pueblo, precio subsidiado) para asegurar que cada hogar alemán pudiera escuchar al Führer. Los discursos de Nuremberg, transmitidos en directo, creaban la sensación de presencia en el mitin sin moverse de casa. Mussolini, Stalin y Franco aplicaron estrategias similares.</p><p><strong>Las democracias:</strong> Roosevelt usó los 'fireside chats' (conversaciones junto a la chimenea, 1933-1944) para crear una conexión íntima y personal con los americanos durante la Depresión. El tono era radicalmente diferente al demagógico europeo: calmado, explicativo, como un padre de familia.</p><p><strong>Los demagogos civiles:</strong> El padre Coughlin en EE. UU. demostró que un particular podía construir desde la radio una audiencia masiva para discursos antisemitas. La radio democratizaba la propaganda, no solo la estatalizaba.</p>`},
  {n:10,q:"Explica cómo la crisis del 29 impulsó la espectacularización del cine.",a:`<p>La Gran Depresión (1929-1939) afectó al cine de dos maneras opuestas que se resolvieron en la misma dirección: el espectáculo.</p><p><strong>El reto:</strong> Las familias en crisis recortaron gastos de ocio. La radio (ya pagada) era gratuita en el hogar. ¿Por qué gastar dinero en ir al cine?</p><p><strong>La respuesta tecnológica:</strong> El cine sonoro (The Jazz Singer, 1927) ya había dado un primer salto espectacular. El Technicolor tricomponente (desde 1932) añadió el color en una época en que la radio era solo audio y la televisión (cuando existía) era en blanco y negro. Hollywood ofrecía algo único: imagen, sonido y color.</p><p><strong>Los géneros de evasión:</strong> Los musicales (Fred Astaire, Busby Berkeley) con sus coreografías elaboradas, los films de gánsteres (una catarsis sobre la violencia real de la era Prohibición) y las comedias sofisticadas (screwball comedies) ofrecían mundos de lujo y aventura en contraste con la miseria de la realidad.</p><p><strong>El sistema de estudios:</strong> Los grandes estudios (MGM, Paramount, Warner, RKO, Fox) invirtieron en estrellas (Greta Garbo, Clark Gable, Cary Grant) cuya sola presencia garantizaba taquilla. La star system era propaganda del espectáculo.</p>`},
  {n:11,q:"Compara la propaganda mecanicista, blanca y negra.",a:`<p><strong>Propaganda mecanicista:</strong> Basada en el modelo conductista de estímulo-respuesta. Asume que el mensaje produce efectos predecibles e iguales en toda la audiencia, independientemente del contexto social o cultural. Fue el modelo dominante en el III Reich (Goebbels) y en los primeros estudios académicos de propaganda. Su error: subestima la capacidad crítica del receptor y las mediaciones sociales.</p><p><strong>Propaganda blanca:</strong> La fuente es conocida (la BBC, Voice of America). La información es verificable (no miente sobre los hechos). Pero selecciona, enmarca y presenta los hechos para producir la respuesta emocional deseada. Es la más creíble a largo plazo porque cuando miente, pierde su activo principal: la confianza. Usada principalmente por los aliados en la IIGM.</p><p><strong>Propaganda negra:</strong> Oculta su origen y finge ser del propio enemigo. Las emisoras de Sefton Delmer fingían ser nazis para desmoralizar a los alemanes. Es la más efectiva a corto plazo pero la más frágil: si se descubre la fuente real, pierde toda credibilidad. También la más éticamente cuestionable.</p><p><strong>Contexto de uso:</strong> La mecanicista se usó internamente en estados autoritarios; la blanca en las democracias en guerra; la negra en operaciones especiales de inteligencia en todos los bandos.</p>`},
  {n:12,q:"Analiza el papel del cine como herramienta propagandística en la Segunda Guerra Mundial.",a:`<p><strong>Alemania:</strong> Leni Riefenstahl (El triunfo de la voluntad, 1935; Olympia, 1938) creó el modelo del documental propagandístico épico. Pero con las derrotas militares, Goebbels viró hacia el entretenimiento escapista (comedias, musicales, films históricos) para mantener la moral sin informar de la realidad. Kolberg (1945) se rodó mientras Berlín era bombardeado.</p><p><strong>Reino Unido:</strong> El cine británico apostó por el realismo documental (Humphrey Jennings, Listen to Britain, 1942) y los dramas de resistencia civil. El mensaje era la entereza del pueblo común, no la gloria militar.</p><p><strong>Estados Unidos:</strong> Hollywood movilizó toda su maquinaria industrial. Frank Capra dirigió Why We Fight (siete documentales explicativos). Los grandes estudios produjeron dramas bélicos, comedias de reclutamiento y films de espionaje. El gobierno (OWI) trabajó directamente con los estudios. Disney produjo cortos de animación para el ejército.</p><p><strong>Diferencia clave:</strong> EE. UU. produjo más propaganda cinematográfica que nadie, pero en un sistema mixto donde los creadores tenían más autonomía. Alemania tenía control total pero perdió el pulso cuando la realidad desmintió la propaganda.</p>`},
  {n:13,q:"Explica cómo la televisión se consolidó como medio de masas en los años 50.",a:`<p><strong>Factores económicos:</strong> El boom de posguerra elevó los salarios de la clase media en EE. UU. (y algo después en Europa). Los televisores bajaron de 300-500 a 100-200 dólares. En 1960, el 90% de los hogares americanos tenían TV; habían tardado 5 años en alcanzar lo que la radio tardó 30.</p><p><strong>Modelo americano (comercial):</strong> NBC, CBS y ABC financiaban la programación con publicidad. Los sponsors patrocinaban programas enteros (The Kraft Television Theatre, The Camel News Caravan). La lógica: maximizar audiencia para maximizar ingresos publicitarios. El criterio de éxito era el rating.</p><p><strong>Modelo europeo (servicio público):</strong> BBC, RAI, ARD, ORTF, TVE eran organismos públicos con misión educativa y cultural. Financiados por el Estado o por canon. Sin publicidad (o con publicidad limitada). Criterio de éxito: cumplimiento de la misión, no audiencia máxima. El monopolio estatal duró en muchos países europeos hasta los años 80.</p><p><strong>La gran diferencia:</strong> En EE. UU. la TV fue desde el principio un negocio. En Europa fue un servicio. Esta diferencia estructural explica la distinta evolución de los contenidos y la regulación en ambos continentes.</p>`},
  {n:14,q:"Describe los primeros formatos televisivos de éxito en EE. UU. y explica el dominio de la sitcom.",a:`<p><strong>Los primeros formatos:</strong> La televisión americana de los años 40 y 50 copió directamente de la radio y el teatro. Los programas de variedades (Ed Sullivan Show, Milton Berle) eran exactamente el vodevil filmado: presentador, sketches, música, actos especiales. Los teletheatres (antologías dramáticas como Playhouse 90) eran teatro retransmitido. Los informativos (See It Now de Murrow) copiaron el formato radiofónico.</p><p><strong>La sitcom:</strong> I Love Lucy (CBS, 1951) definió el género: personajes fijos en situaciones domésticas reconocibles, humor basado en malentendidos y enredos, resolución feliz en 30 minutos. Era perfecta para la televisión por varias razones:</p><p>1. Creaba audiencia fiel (los espectadores querían ver qué le pasaba a Lucy y Ricky cada semana). 2. Era barata de producir (estudio fijo, elenco reducido). 3. Se podía reemitir indefinidamente (Lucille Ball insistió en grabar en película en vez de kinescope, lo que permitió las reposiciones). 4. Reflejaba y reforzaba los valores familiares de la era Eisenhower.</p><p>La sitcom se convirtió en el género más rentable de la televisión y sigue siéndolo (The Big Bang Theory, Friends, Seinfeld).</p>`},
  {n:15,q:"Compara la ficción televisiva en la BBC con la televisión estadounidense.",a:`<p><strong>BBC:</strong> La misión de John Reith marcó la ficción televisiva británica: adaptar clásicos de la literatura (Shakespeare, Dickens, Austen), producir dramas originales de autor con ambición literaria, explorar temas sociales incómodos. The Wednesday Play (años 60) llevó a la TV problemas como el racismo, el desempleo o la violencia doméstica. No había presión de ratings; el criterio era la calidad cultural.</p><p><strong>TV americana:</strong> El criterio dominante era la audiencia. La ficción debía entretener a la máxima audiencia posible para atraer publicidad. Las sitcoms de fórmula, los westerns (Gunsmoke, Bonanza) y las series de acción dominaban el prime time. Los temas controvertidos eran evitados para no alejar anunciantes.</p><p><strong>La convergencia:</strong> A partir de los años 80-90, la TV por cable (HBO desde 1972) liberó a la ficción americana de la tiranía del rating de masas. Los Sopranos (1999), The Wire (2002) o Mad Men (2007) adoptaron la ambición narrativa y la complejidad temática que había sido territorio de la BBC. La 'edad de oro de la TV' americana bebió del modelo europeo de autoría.</p>`},
  {n:16,q:"Explica cómo la Guerra Fría transformó la propaganda en ambos bloques.",a:`<p>La Guerra Fría fue esencialmente una guerra por la legitimidad: ¿qué sistema —capitalismo liberal o comunismo soviético— ofrecía una vida mejor y un futuro más deseable? La batalla se libraba en las mentes y los corazones de los indecisos del Tercer Mundo y de los propios ciudadanos de cada bloque.</p><p><strong>Diferencia estructural:</strong> La URSS tenía un sistema totalitario de control mediático: Pravda, TASS, radio y TV estatales emitían un solo mensaje. EE. UU. tenía medios privados que no podía controlar directamente, lo que hizo su propaganda más compleja pero también más creíble.</p><p><strong>Instrumentos americanos:</strong> Voice of America, Radio Free Europe, Radio Liberty emitían hacia el bloque soviético. La CIA financió revistas culturales (Encounter en UK, Preuves en Francia) y congresos de intelectuales para mostrar la vitalidad cultural del Occidente liberal. El Plan Marshall también fue propaganda: la ayuda económica demostraba que el capitalismo funcionaba.</p><p><strong>Instrumentos soviéticos:</strong> Apoyo a partidos comunistas en todo el mundo, financiación de movimientos de liberación nacional, emisoras internacionales (Radio Moscú) y explotación de las contradicciones del sistema americano (segregación racial, desempleo).</p>`},
  {n:17,q:"Analiza el papel de Hollywood en la propaganda estadounidense de la Guerra Fría.",a:`<p>Hollywood tuvo un papel ambiguo y conflictivo en la propaganda de la Guerra Fría: fue simultáneamente instrumento del gobierno, víctima de la persecución ideológica y espejo de la ansiedad social americana.</p><p><strong>La persecución:</strong> El HUAC (Comité de Actividades Antiamericanas) investigó a Hollywood desde 1947. Los 'Diez de Hollywood' (Dalton Trumbo, entre ellos) fueron encarcelados por negarse a delatar a colegas. Cientos fueron incluidos en listas negras. La autocensura fue masiva: cualquier tema social crítico fue evitado.</p><p><strong>El enemigo soviético en el cine:</strong> Los films de ciencia ficción de los 50 (La invasión de los ladrones de cuerpos, El día que paralizaron la Tierra) usaban la metáfora de la invasión alienígena para representar el miedo a la infiltración comunista. El thriller de espionaje (James Bond a partir de 1962) convirtió el conflicto en entretenimiento de masas.</p><p><strong>El cine como escaparate:</strong> El propio Hollywood, con sus estrellas y sus historias de éxito individual, era propaganda del American way of life. La abundancia de bienes de consumo en las películas americanas contrastaba con el gris ascetismo soviético.</p>`},
  {n:18,q:"Describe las estrategias propagandísticas de la URSS durante la Guerra Fría.",a:`<p><strong>El argumento anticolonial:</strong> La URSS se presentó como aliada natural de los pueblos colonizados frente al imperialismo occidental. Financió movimientos de liberación en Vietnam, Angola, Mozambique, Cuba y decenas de países africanos y asiáticos. El marxismo-leninismo como ideología de la descolonización fue su mayor activo en el Tercer Mundo.</p><p><strong>Explotación de las contradicciones americanas:</strong> La segregación racial (especialmente las imágenes de violencia policial contra manifestantes negros en los años 50 y 60) fue el argumento propagandístico más eficaz. Radio Moscú y las publicaciones soviéticas amplificaron cada incidente racista americano. Era hipócrita (la URSS perseguía a sus propias minorías), pero efectivo.</p><p><strong>La cultura como propaganda:</strong> El ballet, la ópera, el circo soviético y los logros científicos (Sputnik, 1957; Yuri Gagarin, 1961) demostraban que el comunismo podía generar excelencia cultural y tecnológica. El éxito espacial soviético fue un golpe propagandístico devastador para EE. UU.</p><p><strong>Las emisoras internacionales:</strong> Radio Moscú emitía en decenas de idiomas. Sus periodistas extranjeros (a menudo simpatizantes de izquierda) producían una imagen del mundo desde la perspectiva soviética.</p>`},
  {n:19,q:"Explica por qué la guerra de Vietnam es un punto de inflexión en la relación entre propaganda, periodismo y opinión pública.",a:`<p>Vietnam fue la primera guerra televisada en tiempo (casi) real. Sus imágenes destruyeron la credibilidad de la propaganda oficial americana de una manera que ninguna guerra anterior había logrado.</p><p><strong>El acceso sin censura:</strong> A diferencia de las guerras anteriores (donde los periodistas estaban integrados y controlados por el ejército), en Vietnam los corresponsales tuvieron un acceso relativamente libre. Filmaron cadáveres americanos, aldeas incendiadas, ejecuciones en la calle (la célebre foto de Eddie Adams, 1968).</p><p><strong>La brecha de credibilidad:</strong> Los comunicados del Pentágono hablaban de victorias mientras los telediarios mostraban derrotas. La 'brecha de credibilidad' (credibility gap) entre el discurso oficial y la imagen real fue erosionando sistemáticamente la confianza en el gobierno.</p><p><strong>La opinión pública como factor estratégico:</strong> Vietnam demostró que una democracia no puede mantener indefinidamente una guerra impopular. El movimiento antibelicista, alimentado por las imágenes televisivas, fue un factor determinante en la retirada americana.</p><p><strong>El legado:</strong> Todos los ejércitos del mundo aprendieron la lección de Vietnam: el control de la información es parte de la estrategia militar. Las guerras del Golfo (1991, 2003) fueron gestionadas mediáticamente con periodistas 'embebidos' (embedded), integrando a los periodistas en unidades militares para controlar qué imagen del conflicto llegaba al público.</p>`},
  {n:20,q:"Compara las aportaciones de Reeves, Ogilvy y Bernbach.",a:`<p>Los tres grandes de la publicidad del siglo XX representan tres filosofías distintas sobre cómo comunicar y sobre qué es el consumidor.</p><p><strong>Rosser Reeves (racionalismo):</strong> El consumidor es un ser racional que toma decisiones basadas en beneficios objetivos. La USP (unique selling proposition) identifica el beneficio único del producto y lo repite hasta que el consumidor lo asocia automáticamente. Es publicidad eficaz pero no memorable. Ejemplo: 'Se derriten en tu boca, no en tu mano' (M&Ms).</p><p><strong>David Ogilvy (imagen de marca):</strong> El consumidor no solo compra un producto sino una identidad. Construye marcas con personalidad aspiracional: el Hombre de la Camisa Hathaway, el Baron Schweppes. Su publicidad es elegante, informativa y aspiracional. Refleja los valores de la clase media alta que quería ser.</p><p><strong>Bill Bernbach (revolución creativa):</strong> El consumidor es inteligente y merece ser respetado. La campaña de Volkswagen 'Think Small' (1959) fue lo opuesto al maximalismo americano: modestia, ironía, humor, respeto al consumidor. Bernbach inauguró la era de la creatividad publicitaria como valor en sí mismo.</p><p><strong>El contexto cultural:</strong> Reeves pertenece a los años 50 de conformismo; Ogilvy al ascenso de la clase media aspiracional; Bernbach a la contracultura de los 60. Los tres reflejan su época.</p>`},
  {n:21,q:"Explica cómo la informática doméstica y los videojuegos prepararon el terreno para Internet.",a:`<p>Internet no llegó a los hogares como una tecnología abstracta: llegó a través de ordenadores personales que los usuarios ya conocían, y los videojuegos fueron decisivos para crear esa familiaridad.</p><p><strong>El ordenador personal:</strong> La 'trinidad de 1977' (Apple II, Commodore PET, TRS-80) llevó el ordenador a los hogares. En los años 80, el IBM PC y los compatibles lo popularizaron en las oficinas. La gente aprendió a teclear, a manejar archivos, a pensar en términos digitales.</p><p><strong>Los videojuegos:</strong> Atari 2600, Nintendo NES, Sega Master System... Los videojuegos crearon una generación que interactuaba de forma natural con pantallas e interfaces digitales. No era solo entretenimiento: era alfabetización digital inconsciente.</p><p><strong>Los BBS y las redes previas:</strong> Antes de la web, existían los Bulletin Board Systems (BBS): usuarios que conectaban por módem a servidores locales para intercambiar mensajes y archivos. Servicios como CompuServe y AOL (años 80-90) enseñaron a millones a comunicarse digitalmente.</p><p><strong>El resultado:</strong> Cuando Berners-Lee inventó la web en 1991 y los primeros navegadores (Mosaic, 1993; Netscape, 1994) la hicieron accesible, encontraron una población con ordenadores en casa, familiarizada con las interfaces digitales y ansiosa por conectarse.</p>`},
  {n:22,q:"Compara la web 1.0 y la web 2.0.",a:`<p><strong>Web 1.0 (1991-2004 aproximadamente):</strong> 'Solo lectura'. Las páginas las crean organizaciones o individuos con conocimientos técnicos (HTML, servidores). El usuario navega y consume pero no puede publicar directamente. Es una biblioteca digital: puedes leer todo lo que hay, pero no puedes escribir en las paredes.</p><p>El ecosistema mediático: los medios tradicionales dominan porque producen el contenido que los usuarios consumen. La autoridad sigue en los productores profesionales.</p><p><strong>Web 2.0 (desde 2004):</strong> 'Lectura y escritura'. Los blogs (Blogger, 2003), las wikis (Wikipedia, 2001), los vídeos de usuario (YouTube, 2005), las redes sociales (MySpace, 2003; Facebook, 2004) permiten a cualquiera publicar sin saber programar.</p><p>El papel del usuario cambia radicalmente: de consumidor pasivo a prosumidor activo. El 'contenido generado por el usuario' (user generated content) se convierte en la mayor fuente de contenido de Internet.</p><p><strong>Consecuencias para los medios:</strong> Los medios tradicionales pierden el monopolio de la producción de información. Cualquiera puede publicar; el problema ya no es el acceso a la impresión sino la visibilidad en un océano de contenidos. Nacen los intermediarios (Google, Facebook) que controlan esa visibilidad.</p>`},
  {n:23,q:"Analiza el impacto de los intermediarios mediáticos en la crisis del periodismo.",a:`<p>Google, Facebook/Meta, Twitter/X, Apple News y similares se convirtieron en las puertas de entrada a la información para miles de millones de personas. Este poder de intermediación transformó radicalmente el ecosistema mediático.</p><p><strong>El problema de la distribución:</strong> Un periódico puede publicar la mejor investigación del mundo, pero si Google no la indexa bien o el algoritmo de Facebook no la amplifica, nadie la leerá. Los intermediarios tienen más poder sobre la distribución que los propios creadores de contenido.</p><p><strong>El problema publicitario:</strong> Google y Facebook absorbieron la mayor parte del mercado publicitario digital. Los anunciantes podían dirigirse con precisión quirúrgica a sus audiencias objetivo a través de las plataformas, sin necesidad de pagar a los medios como intermediarios. El mercado publicitario que sostenía el periodismo se desvaneció.</p><p><strong>El problema del modelo de negocio:</strong> Los medios ofrecieron contenido gratis en la web esperando ingresos publicitarios que nunca llegaron a compensar la pérdida de suscripciones en papel y la caída de la publicidad. Las plataformas se quedaron con el dinero de la publicidad usando el contenido periodístico como anzuelo.</p><p><strong>El problema algorítmico:</strong> Los algoritmos de recomendación priorizan el contenido que genera más engagement (clics, reacciones, compartidos). El contenido emocional, provocador o sensacionalista supera algorítmicamente al periodismo matizado y verificado.</p>`},
  {n:24,q:"Explica las diferentes respuestas de los medios ante la crisis del periodismo digital.",a:`<p>Ante la crisis del modelo publicitario digital, los medios han explorado diversas estrategias con resultados desiguales:</p><p><strong>El paywall (muro de pago):</strong> The New York Times introdujo un muro de pago poroso en 2011 (algunos artículos gratuitos al mes, luego suscripción). Ha funcionado: el NYT supera los 10 millones de suscriptores digitales. Otros medios (Wall Street Journal, Financial Times) también con éxito. Funciona para medios con contenidos de suficiente valor diferencial.</p><p><strong>La membresía voluntaria:</strong> The Guardian ofrece todo el contenido gratuito pero solicita contribuciones voluntarias. Millones de lectores pagan porque sienten que el periodismo de calidad merece sostenerse. Requiere una relación de confianza muy fuerte con la audiencia.</p><p><strong>Las organizaciones sin ánimo de lucro:</strong> The Salt Lake Tribune (2019), ProPublica (periodismo de investigación) o elDiario.es en España combinan membresía, donaciones de fundaciones y socios. Liberan la redacción de la presión comercial pero dependen de la generosidad filantrópica.</p><p><strong>La publicidad nativa:</strong> Contenido patrocinado con aspecto de artículo periodístico. Genera ingresos a corto plazo pero daña la credibilidad a largo plazo. Es el terreno más pantanoso éticamente.</p><p><strong>La diversificación:</strong> Eventos, podcasts, newsletters de pago, licencias de contenido, formación. Los medios buscan múltiples fuentes de ingresos para no depender de una sola.</p>`},
  {n:25,q:"Describe cómo cambió el consumo televisivo con el vídeo doméstico, Internet y las plataformas VOD.",a:`<p><strong>El vídeo doméstico (años 80):</strong> El VHS (y brevemente el Betamax) liberaron al espectador de la tiranía del horario de programación. Por primera vez, podías ver lo que querías cuando querías. Las videoclub (Blockbuster) crearon una nueva industria. Los estudios de Hollywood, tras intentar prohibirlo judicialmente (Sony vs. Universal, 1984), descubrieron que el mercado doméstico era más lucrativo que las salas.</p><p><strong>Internet y el streaming temprano (años 2000):</strong> YouTube (2005) democratizó la publicación de vídeo. El streaming legal (iTunes desde 2003 para música, luego vídeo) y los servicios de alquiler digital cambiaron los hábitos antes de que existieran plataformas de suscripción.</p><p><strong>Las plataformas VOD (Video on Demand):</strong> Netflix (streaming desde 2007, contenido original desde 2013), Amazon Prime Video, HBO Max, Disney+ y decenas de competidores crearon el modelo de suscripción mensual con catálogo ilimitado. El concepto de 'temporada de TV' perdió sentido: Netflix lanzaba temporadas completas para el binge watching.</p><p><strong>La fragmentación:</strong> El espectador ya no ve lo mismo que su vecino. El consumo televisivo se fragmentó en miles de catálogos y millones de opciones. El 'momento TV compartido' (cuando millones veían el mismo programa el mismo día) prácticamente desapareció.</p>`},
  {n:26,q:"Analiza el modelo de Netflix y por qué supuso una ruptura con la lógica televisiva tradicional.",a:`<p>Netflix comenzó como servicio de alquiler de DVDs por correo (1997), se convirtió en plataforma de streaming (2007) y luego en productora de contenidos originales (House of Cards, 2013). Cada fase representó una ruptura.</p><p><strong>Ruptura 1 — El catálogo ilimitado:</strong> La televisión tradicional ofrecía lo que decidía el programador en el momento que él elegía. Netflix puso todo el catálogo disponible siempre. El usuario tiene el control total sobre qué ver y cuándo.</p><p><strong>Ruptura 2 — La temporada completa desde el estreno:</strong> La lógica televisiva tradicional funcionaba con el 'gancho semanal': un capítulo cada semana, el espectador espera siete días para el siguiente. Netflix lanzó House of Cards completa (13 episodios) el mismo día. Eliminó la espera y creó el binge watching como hábito de consumo.</p><p><strong>Ruptura 3 — Sin publicidad:</strong> El modelo de suscripción elimina los anuncios. Esto cambia la relación con el usuario (paga por el servicio, no es el producto que se vende a los anunciantes) y permite contenidos que la TV comercial nunca haría (sin presión de ratings ni de anunciantes conservadores).</p><p><strong>Ruptura 4 — Los datos:</strong> Netflix sabe exactamente qué ven sus usuarios, durante cuánto tiempo, qué momentos generan abandono. Esta información permite tomar decisiones de producción basadas en datos, no en intuiciones de programadores.</p>`},
  {n:27,q:"Explica cómo la espectacularización del cine en el siglo XXI se relaciona con el blockbuster y la competencia con otros medios.",a:`<p>El cine del siglo XXI hereda el modelo blockbuster inaugurado por Spielberg con Tiburón (1975) y perfeccionado por Lucas con Star Wars (1977), pero lo lleva al extremo ante una competencia sin precedentes.</p><p><strong>El blockbuster como lógica industrial:</strong> La producción se concentra en tentpoles (películas evento con presupuestos de 150-300 millones de dólares) que generan ingresos no solo en taquilla sino en merchandising, parques temáticos, videojuegos, streaming y series derivadas. El universo Marvel (MCU) es el modelo perfecto: cada película es un evento mediático y un capítulo de una saga mayor.</p><p><strong>La competencia con las plataformas:</strong> Netflix, HBO Max y Disney+ ofrecen contenidos de altísima calidad a domicilio. ¿Por qué salir de casa? El cine solo puede competir ofreciendo algo que la pantalla doméstica no puede replicar: la experiencia colectiva, la sala Dolby Atmos, la pantalla de 20 metros, los efectos visuales diseñados para el IMAX.</p><p><strong>El riesgo de la fórmula:</strong> La concentración en blockbusters ha reducido el espacio para el cine de autor y el drama adulto, que han migrado masivamente a las plataformas. El cine de sala tiende a ser espectáculo puro; el cine 'de texto' vive en streaming.</p>`},
  {n:28,q:"Compara el cine europeo de posguerra (neorrealismo, nouvelle vague) con el nuevo Hollywood y el blockbuster.",a:`<p><strong>Neorrealismo italiano (1945-1952):</strong> Reacción al cine fascista y al espectáculo americano. Rodado en exteriores con luz natural, actores no profesionales y presupuestos mínimos. Temas: la pobreza, la guerra, la resistencia. Rossellini (Roma, ciudad abierta), De Sica (Ladrón de bicicletas), Visconti. El cine como documento social, no como evasión.</p><p><strong>Nouvelle Vague francesa (1959-1968):</strong> Cinéfilos del Cahiers du Cinéma (Godard, Truffaut, Chabrol) convirtidos en directores. Rompieron las convenciones narrativas (jump cuts, cámara al hombro, narración en primera persona), reivindicaron al director como 'autor' y exploraron temas existenciales urbanos. À bout de souffle (1960) es el manifiesto.</p><p><strong>Nuevo Hollywood (1967-1980):</strong> Absorbe las influencias europeas (muchos directores americanos de la época estudiaron a Godard y Fellini) pero dentro del sistema de estudios. Coppola, Scorsese, Kubrick, Altman. Mayor libertad temática (sexo, violencia, ambigüedad moral) tras la caída del código Hays (1968). El padrino, Chinatown, Taxi Driver.</p><p><strong>El blockbuster:</strong> Con Tiburón y Star Wars vuelve el cine de entretenimiento puro, pero con el lenguaje cinematográfico sofisticado del Nuevo Hollywood. El resultado es el cine dominante actual: espectáculo formal con valores de producción altísimos, pero con la profundidad temática reducida al mínimo necesario para justify el precio de la entrada.</p>`},
  {n:29,q:"Analiza cómo la radio se reinventó tras la llegada de la televisión.",a:`<p>La televisión arrebató a la radio la audiencia familiar del prime time y los grandes anunciantes. La radio respondió con una transformación radical que la convirtió en un medio diferente, no en un medio menor.</p><p><strong>La transistorización:</strong> El transistor (Bell Labs, 1947) hizo los radios portátiles, baratos y personales. En los años 50, los adolescentes americanos compraron millones de transistores baratos que podían llevar al parque, a la playa o esconder en su cuarto. La radio dejó de ser el televisor de la familia reunida en el salón y se convirtió en el compañero personal del individuo.</p><p><strong>La FM y el rock:</strong> La frecuencia modulada ofrecía calidad de sonido muy superior a la AM. Perfecta para música. El rock and roll, el jazz y luego todos los géneros musicales encontraron en la FM su escaparate natural. La radio musical para jóvenes era algo que la televisión generalista no podía ofrecer.</p><p><strong>La especialización:</strong> La televisión se quedó con la audiencia generalista. La radio respondió especializándose por géneros y públicos: radio de noticias 24 horas (all-news), radio clásica, radio de jazz, radio deportiva, radio conservadora de comentario político (Rush Limbaugh). Cada emisora apuntaba a un nicho específico.</p><p><strong>El morning show:</strong> Los datos de audiencia revelaron que el pico máximo era en el trayecto al trabajo (7-9 AM). El 'programa despertador' con música, noticias breves, tiempo y humor se convirtió en el slot más valioso de la radio.</p>`},
  {n:30,q:"Explica cómo la crisis de reputación del periodismo en el siglo XXI se relaciona con errores de cobertura, cambios tecnológicos y transformaciones culturales.",a:`<p>La crisis de reputación del periodismo en el siglo XXI tiene tres dimensiones interrelacionadas:</p><p><strong>Los errores propios:</strong> El periodismo institucional cometió errores graves que erosionaron su credibilidad. La cobertura de las armas de destrucción masiva en Iraq (2002-2003), donde grandes medios como el NYT publicaron información falsa del gobierno sin verificar suficientemente. El caso Jayson Blair (NYT, 2003), periodista que inventaba noticias y entrevistas durante años. El News of the World (2011), cerrado por hackear teléfonos de víctimas de crímenes. Las teorías conspirativas de El Mundo sobre el 11-M. Cada escándalo reforzó la desconfianza.</p><p><strong>Los cambios tecnológicos:</strong> Internet democratizó la publicación, pero también la desinformación. Cualquiera puede publicar; el usuario tiene dificultades para distinguir una noticia verificada de una fake news. Los algoritmos de redes sociales amplifican el contenido emocional (incluyendo el falso) sobre el verificado pero aburrido. La velocidad digital penaliza la verificación.</p><p><strong>Las transformaciones culturales:</strong> La polarización política creciente creó un ecosistema donde los medios son percibidos como instrumentos de un bando u otro. La confianza en las instituciones en general (gobierno, ciencia, medios) ha caído en las democracias occidentales. El periodismo no es percibido como árbitro neutral sino como actor político más, lo que hace que la mitad del público lo perciba como enemigo a priori.</p>`}
];

let currentTema = 1;
let openCards = {};
let answeredQs = {};
let userSelections = {};
let examQuestions = [];

function renderNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  
  data.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (t.id === currentTema ? ' active' : '');
    btn.textContent = 'Tema ' + t.id;
    btn.onclick = () => { currentTema = t.id; openCards = {}; renderNav(); renderContent(); };
    nav.appendChild(btn);
  });
  
  const devBtn = document.createElement('button');
  devBtn.className = 'nav-btn' + (currentTema === 99 ? ' active' : '');
  devBtn.textContent = 'Desarrollo';
  devBtn.onclick = () => { currentTema = 99; openCards = {}; renderNav(); renderContent(); };
  nav.appendChild(devBtn);

  const examBtn = document.createElement('button');
  examBtn.className = 'nav-btn special' + (currentTema === 'exam' ? ' active' : '');
  examBtn.textContent = 'Simulacro Examen';
  examBtn.onclick = () => { 
    if(currentTema !== 'exam'){
      currentTema = 'exam';
      if(examQuestions.length === 0) generateExam();
      openCards = {}; 
      renderNav(); 
      renderContent(); 
    }
  };
  nav.appendChild(examBtn);
}

function generateExam() {
  let allQs = [];
  data.forEach(t => {
    t.qs.forEach(q => {
      // Guardamos la info de la pregunta y su tema original para mostrarlo como "tag"
      allQs.push({ ...q, sourceTemaId: t.id });
    });
  });
  // Barajar el array usando un método sencillo de ordenación aleatoria
  allQs.sort(() => Math.random() - 0.5);
  examQuestions = allQs.slice(0, 10);
  
  // Reseteamos el estado de las preguntas del examen (para que esten sin contestar)
  examQuestions.forEach((_, i) => {
    delete answeredQs['e' + i];
    delete userSelections['e' + i];
  });
}

window.forceNewExam = function() {
  generateExam();
  renderContent();
};

function toggleDevCard(id){
  openCards[id] = !openCards[id];
  const body = document.getElementById('body-' + id);
  const icon = document.getElementById('icon-' + id);
  if(body){ 
    if(openCards[id]) {
      body.classList.add('open');
      icon.classList.add('open');
    } else {
      body.classList.remove('open');
      icon.classList.remove('open');
    }
  }
}

// Logic for Interactive Quiz
window.handleOptionClick = function(qId, selectedIdx, correctIdxsString, isMulti) {
  if(answeredQs[qId]) return;

  const correctIdxs = JSON.parse(correctIdxsString);
  userSelections[qId] = userSelections[qId] || [];

  if (!isMulti) {
    // Single choice selection -> Auto evaluate
    userSelections[qId] = [selectedIdx];
    answeredQs[qId] = true;
    evaluateQuestion(qId, correctIdxs);
  } else {
    // Multi choice selection -> Toggle style & show Verify button
    const selIndex = userSelections[qId].indexOf(selectedIdx);
    const container = document.getElementById('opts-' + qId);
    const btn = container.querySelectorAll('.opt-btn')[selectedIdx];

    if (selIndex > -1) {
      userSelections[qId].splice(selIndex, 1);
      btn.classList.remove('selected');
    } else {
      userSelections[qId].push(selectedIdx);
      btn.classList.add('selected');
    }

    const verifyBtn = document.getElementById('verify-' + qId);
    if (userSelections[qId].length > 0) {
      verifyBtn.style.display = 'inline-block';
    } else {
      verifyBtn.style.display = 'none';
    }
  }
};

window.verifyMulti = function(qId, correctIdxsString) {
  if(answeredQs[qId]) return;
  answeredQs[qId] = true;
  const correctIdxs = JSON.parse(correctIdxsString);
  evaluateQuestion(qId, correctIdxs);
};

function evaluateQuestion(qId, correctIdxs) {
  const container = document.getElementById('opts-' + qId);
  const buttons = container.querySelectorAll('.opt-btn');
  const selections = userSelections[qId] || [];

  buttons.forEach((btn, idx) => {
    btn.disabled = true;
    btn.classList.remove('selected');

    if (correctIdxs.includes(idx)) {
      btn.classList.add('correct');
      btn.innerHTML = '✓ ' + btn.innerHTML.replace(/^[✓✗] /, '');
    } else if (selections.includes(idx)) {
      btn.classList.add('wrong');
      btn.innerHTML = '✗ ' + btn.innerHTML.replace(/^[✓✗] /, '');
    }
  });

  const verifyBtn = document.getElementById('verify-' + qId);
  if (verifyBtn) verifyBtn.style.display = 'none';
  
  document.getElementById('exp-' + qId).style.display = 'block';
}

function renderContent(){
  const content = document.getElementById('content');
  content.innerHTML = '';
  
  // Render Exam Section
  if(currentTema === 'exam'){
    const headHTML = `
      <div class="exam-header">
        <div class="tema-title" style="margin-bottom:0;">Simulacro de Examen</div>
        <button class="nav-btn active" style="margin-bottom:0;" onclick="forceNewExam()">↻ Generar Nuevo Examen</button>
      </div>
      <div class="tema-sub">10 preguntas obtenidas de forma aleatoria de todos los temas.</div>
      <div class="section-label">Preguntas tipo test interactivo</div>
    `;
    content.insertAdjacentHTML('beforeend', headHTML);

    examQuestions.forEach((q, i) => {
      const id = 'e' + i; // isolated ID to not interfere with standard topics
      const correctIdxs = Array.isArray(q.ans) ? q.ans : [q.ans];
      const isMulti = correctIdxs.length > 1;
      const isAnswered = answeredQs[id] === true;
      const selections = userSelections[id] || [];
      
      const card = document.createElement('div');
      card.className = 'q-card';
      card.id = 'card-' + id;
      
      let multiHint = isMulti ? `<span class="multi-hint">(Selecciona ${correctIdxs.length} opciones)</span>` : '';
      let temaTag = `<span class="tema-tag">Tema ${q.sourceTemaId}</span>`;
      
      // Generate Options
      let optsHtml = `<div class="options-container" id="opts-${id}">`;
      q.opts.forEach((o, oi) => {
        const correctString = JSON.stringify(correctIdxs);
        let btnClass = 'opt-btn';
        let btnText = o;
        let disabledAttr = '';
        
        if (isAnswered) {
          disabledAttr = 'disabled';
          if (correctIdxs.includes(oi)) {
            btnClass += ' correct';
            btnText = '✓ ' + o;
          } else if (selections.includes(oi)) {
            btnClass += ' wrong';
            btnText = '✗ ' + o;
          }
        } else if (selections.includes(oi)) {
          btnClass += ' selected';
        }
        
        optsHtml += `<button class="${btnClass}" ${disabledAttr} onclick='handleOptionClick("${id}", ${oi}, "${correctString}", ${isMulti})'>${btnText}</button>`;
      });
      optsHtml += `</div>`;
      
      let verifyHtml = '';
      if (isMulti) {
        const showVerify = !isAnswered && selections.length > 0;
        verifyHtml = `<button class="verify-btn" id="verify-${id}" onclick='verifyMulti("${id}", "${JSON.stringify(correctIdxs)}")' style="display: ${showVerify ? 'inline-block' : 'none'};">Comprobar</button>`;
      }

      // Assembling Question Block
      card.innerHTML = `
        <div class="q-header">
          <span class="q-num">${i+1}.</span>
          <span class="q-text">${q.q} ${multiHint} ${temaTag}</span>
        </div>
        ${optsHtml}
        ${verifyHtml}
        <div class="explain" id="exp-${id}" style="display: ${isAnswered ? 'block' : 'none'}">${q.exp}</div>
      `;
      
      content.appendChild(card);
    });
    return;
  }

  // Render Development Questions Section
  if(currentTema === 99){
    const headHTML = `<div class="tema-title">Preguntas de desarrollo</div><div class="tema-sub">Haz clic en cada pregunta para ver la respuesta razonada</div>`;
    content.insertAdjacentHTML('beforeend', headHTML);
    
    devQuestions.forEach(dq => {
      const id = 'dev-' + dq.n;
      const isOpen = openCards[id];
      const card = document.createElement('div');
      card.className = 'dev-card';
      card.innerHTML = `
        <div class="dev-q" onclick="toggleDevCard('${id}')">
          <span class="q-num">${dq.n}.</span>
          <span style="flex:1">${dq.q}</span>
          <span class="q-toggle${isOpen?' open':''}" id="icon-${id}">▾</span>
        </div>
        <div class="dev-body${isOpen?' open':''}" id="body-${id}">
          ${dq.a}
        </div>
      `;
      content.appendChild(card);
    });
    return;
  }
  
  // Render Regular Test Questions Section
  const tema = data.find(t => t.id === currentTema);
  if(!tema) return;
  
  const headHTML = `
    <div class="tema-title">Tema ${tema.id} — ${tema.title}</div>
    <div class="tema-sub">${tema.sub || 'Selecciona la opción correcta para cada pregunta y descubre la explicación histórica.'}</div>
    <div class="section-label">Preguntas tipo test interactivo</div>
  `;
  content.insertAdjacentHTML('beforeend', headHTML);
  
  tema.qs.forEach((q, i) => {
    const id = 't' + tema.id + 'q' + i;
    const correctIdxs = Array.isArray(q.ans) ? q.ans : [q.ans];
    const isMulti = correctIdxs.length > 1;
    const isAnswered = answeredQs[id] === true;
    const selections = userSelections[id] || [];
    
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'card-' + id;
    
    let multiHint = isMulti ? `<span class="multi-hint">(Selecciona ${correctIdxs.length} opciones)</span>` : '';
    
    // Generate Options
    let optsHtml = `<div class="options-container" id="opts-${id}">`;
    q.opts.forEach((o, oi) => {
      const correctString = JSON.stringify(correctIdxs);
      let btnClass = 'opt-btn';
      let btnText = o;
      let disabledAttr = '';
      
      if (isAnswered) {
        disabledAttr = 'disabled';
        if (correctIdxs.includes(oi)) {
          btnClass += ' correct';
          btnText = '✓ ' + o;
        } else if (selections.includes(oi)) {
          btnClass += ' wrong';
          btnText = '✗ ' + o;
        }
      } else if (selections.includes(oi)) {
        btnClass += ' selected';
      }
      
      optsHtml += `<button class="${btnClass}" ${disabledAttr} onclick='handleOptionClick("${id}", ${oi}, "${correctString}", ${isMulti})'>${btnText}</button>`;
    });
    optsHtml += `</div>`;
    
    let verifyHtml = '';
    if (isMulti) {
      const showVerify = !isAnswered && selections.length > 0;
      verifyHtml = `<button class="verify-btn" id="verify-${id}" onclick='verifyMulti("${id}", "${JSON.stringify(correctIdxs)}")' style="display: ${showVerify ? 'inline-block' : 'none'};">Comprobar</button>`;
    }

    // Assembling Question Block
    card.innerHTML = `
      <div class="q-header">
        <span class="q-num">${i+1}.</span>
        <span class="q-text">${q.q} ${multiHint}</span>
      </div>
      ${optsHtml}
      ${verifyHtml}
      <div class="explain" id="exp-${id}" style="display: ${isAnswered ? 'block' : 'none'}">${q.exp}</div>
    `;
    
    content.appendChild(card);
  });
}

renderNav();
renderContent();
</script>

</body>
</html>
