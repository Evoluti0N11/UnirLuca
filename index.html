<!DOCTYPE html>
<html lang="it" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Annyeong Sara">
  <meta name="description" content="Impara il Coreano in 45 giorni — personalizzato per Sara con gym, cosplay, LoL, K-drama e animali!">
  <meta name="theme-color" content="#fdfbf7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">

  <title>🌸 Annyeong Sara! — Coreano in 45 Giorni</title>

  <!-- Icons & Manifest -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json">

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">

  <!-- Tailwind (config before script) -->
  <script>tailwind = { config: { darkMode: 'class' } }</script>
  <script src="https://cdn.tailwindcss.com" defer></script>

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest" defer></script>

  <!-- Leaflet Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="" defer></script>

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js" defer></script>

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#fdfbf7] dark:bg-slate-900 transition-colors duration-300">

  <!-- Root App Container -->
  <div id="root" class="min-h-screen flex flex-col w-full max-w-screen overflow-x-hidden">
    <!-- Loading splash -->
    <div class="h-screen flex flex-col items-center justify-center gap-4 text-pink-500">
      <div class="text-6xl animate-bounce" style="font-family:'Noto Sans KR'">한</div>
      <p class="font-black text-lg text-gray-600">Caricamento...</p>
    </div>
  </div>

  <!-- Static data (sets window.COURSE_DATA, window.MAP_REGIONS, etc.) -->
  <script src="js/data.js"></script>

  <!-- App — ES Module entry point (loads all modules) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
